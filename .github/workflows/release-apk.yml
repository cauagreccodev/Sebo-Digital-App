name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-apk:
    name: Build and publish Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build release APK
        run: >
          flutter build apk --release
          --dart-define=SEBO_API_URL=https://sebo-digital-site-production.up.railway.app

      - name: Prepare APK asset
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME:-manual}"
          APK_NAME="sebo-digital-app-${TAG_NAME}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> "$GITHUB_ENV"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_NAME }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Sebo Digital App ${{ github.ref_name }}
          generate_release_notes: true
          overwrite_files: true
          files: ${{ env.APK_NAME }}
